<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siempre Bellas</title>

<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

/* GENERAL */
body{
margin:0;
font-family: Arial, sans-serif;
background:#fff;
}

/* NAVBAR */
.navbar a {
display:block;
padding: 12px;
color: white;
text-decoration: none;
font-size: 17px;
text-align: center;
background: black;
}

/* BOTÓN VOLVER */
.btn-volver{
position: fixed;
top: 50%;
left: 15px;
transform: translateY(-50%);
background: #000;
color: #fff;
width:45px;
height:45px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
z-index:1001;
text-decoration:none;
box-shadow:0 0 10px rgba(0,0,0,0.5);
transition:0.3s;
}
.btn-volver:hover{
background:#ff69b4;
color:#fff;
transform: translateY(-50%) scale(1.1);
}

/* TITULOS */
h1,h2{
text-align:center;
}

/* GRID PROFESIONAL */
.grid{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:20px;
padding:20px;
}

/* RESPONSIVE */
@media (max-width:900px){
.grid{
grid-template-columns: repeat(2,1fr);
}
}

@media (max-width:500px){
.grid{
grid-template-columns: 1fr;
}
}

/* CARD ESTÉTICA */
.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(255,105,180,0.4);
}

/* IMAGEN */
.card img{
width:100%;
height:220px;
object-fit:cover;
}

/* TEXTO */
.card-content{
padding:15px;
text-align:center;
font-weight:bold;
color:#444;
}

/* TITULO SECCION */
.titulo-seccion{
text-align:center;
background:#ff69b4;
color:#fff;
padding:15px;
margin-top:30px;
font-weight:bold;
}

/* RESPONSIVE TEXTO */
@media (max-width:768px){
h1{font-size:22px;}
}

</style>

</head>

<body>

<!-- BOTÓN VOLVER -->
<a href="https://paginaweb1.github.io/dise-os_web.com/" class="btn-volver">
  <i class="fa fa-arrow-left"></i>
</a>

<!-- NAVBAR -->
<div class="navbar">
  <a href="#">BIENVENIDOS</a> 
</div>

<!-- TITULOS -->
<div class="w3-container">
  <h1>Siempre Bellas 💅</h1>
  <h2>Realza tu belleza con estilo</h2>
</div>

<!-- VIDEO -->
<div class="w3-container w3-center">
<video src="mov_bbb.mp4" autoplay muted loop width="100%"></video>
</div>

<!-- WHATSAPP -->
<div class="w3-container" style="position:relative">
<a href="https://wa.me/573209304898" target="_blank"
class="w3-button w3-xlarge w3-circle w3-teal"
style="position:absolute;top:-28px;right:24px">
<i class="fa fa-whatsapp"></i>
</a>
</div>

<!-- SECCION -->
<div class="titulo-seccion">
  <h2>Nuestros Servicios</h2>
</div>

<!-- GRID DE SERVICIOS -->
<div class="grid">

<div class="card">
<img src="uñas1.png">
<div class="card-content">Manicure Profesional</div>
</div>

<div class="card">
<img src="uñas2.png">
<div class="card-content">Diseños en Uñas</div>
</div>

<div class="card">
<img src="uñas3.png">
<div class="card-content">Pedicure Spa</div>
</div>

<div class="card">
<img src="pelo1.png">
<div class="card-content">Cortes Modernos</div>
</div>

<div class="card">
<img src="pelo2.png">
<div class="card-content">Tintes y Coloración</div>
</div>

<div class="card">
<img src="pelo3.png">
<div class="card-content">Peinados Profesionales</div>
</div>

</div>

<!-- FOOTER -->
<footer class="w3-center w3-black w3-padding-64">
<div class="w3-xlarge">
<i class="fa fa-facebook-official"></i>
<i class="fa fa-instagram"></i>
</div>
<p>Siempre Bellas © 2026</p>
</footer>

</body>
</html>
