/* GENERAL */

/* NAVBAR */
.navbar a {

/* BOTÓN VOLVER */
.btn-volver{
position: fixed;
top: 50%;
left: 15px;
transform: translateY(-50%);
background: #000;
color: #fff;
width:45px;
height:45px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
z-index:1001;
text-decoration:none;
box-shadow:0 0 10px rgba(0,0,0,0.5);
transition:0.3s;
}
.btn-volver:hover{
background:#00ff9d;
color:#000;
transform: translateY(-50%) scale(1.1);
}

/* TITULO */
.titulo-seccion{
text-align:center;
background:#ff9800;
color:#fff;
padding:15px;
margin-top:30px;
font-weight:bold;
}

/* GRID PERSONALIZADO */
.grid{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:20px;
padding:20px;
}

/* RESPONSIVE GRID */
@media (max-width:900px){
.grid{
grid-template-columns: repeat(2,1fr);
}
}

@media (max-width:500px){
.grid{
grid-template-columns: 1fr;
}
}

/* CARD */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-5px);
}

/* IMAGEN */
.card img{
width:100%;
height:200px;
object-fit:cover;
}

/* TEXTO */
.card-content{
padding:15px;
text-align:center;
font-weight:bold;
}
